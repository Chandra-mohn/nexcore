  #   hostname: spark-worker
  #   networks:
  #     - nex-net
  #   depends_on:
  #     spark-master:
  #       condition: service_healthy
  #   environment:
  #     SPARK_MODE: worker
  #     SPARK_MASTER_URL: spark://spark-master:7077
